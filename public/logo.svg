<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 68" fill="none">
  <defs>
    <mask id="arch-door">
      <rect width="110" height="68" fill="white"/>
      <!-- Arch entrance cutout: rectangle base + semicircle top -->
      <path d="M48 68 L48 50 A7 7 0 0 0 62 50 L62 68 Z" fill="black"/>
    </mask>
  </defs>

  <g fill="#d4a742" mask="url(#arch-door)">
    <!-- ── LEFT TOWER ── -->
    <!-- Battlements -->
    <rect x="2"  y="10" width="9" height="12"/>
    <rect x="15" y="10" width="9" height="12"/>
    <!-- Tower body -->
    <rect x="2"  y="20" width="22" height="48"/>

    <!-- ── RIGHT TOWER ── -->
    <!-- Battlements -->
    <rect x="86" y="10" width="9" height="12"/>
    <rect x="99" y="10" width="9" height="12"/>
    <!-- Tower body -->
    <rect x="86" y="20" width="22" height="48"/>

    <!-- ── CENTER WALL ── -->
    <!-- Battlements (4 merlons) -->
    <rect x="25" y="20" width="11" height="12"/>
    <rect x="40" y="20" width="11" height="12"/>
    <rect x="55" y="20" width="11" height="12"/>
    <rect x="70" y="20" width="11" height="12"/>
    <!-- Wall body -->
    <rect x="24" y="30" width="62" height="38"/>

    <!-- ── TOWER WINDOW SLITS ── -->
    <rect x="8"  y="28" width="5" height="10" rx="1" fill="#3a293e"/>
    <rect x="92" y="28" width="5" height="10" rx="1" fill="#3a293e"/>
  </g>
</svg>
